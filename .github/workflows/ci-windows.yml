---
name: CI-Windows
permissions: {}

on:
  workflow_call:
    inputs:
      release_commit:
        required: true
        type: string
      release_version:
        required: true
        type: string
    # Secrets are forwarded from ci.yml via `secrets: inherit`. They are
    # declared optional here so the build still runs while SIGN_ARTIFACTS
    # is disabled (no values present) and only enforced inside the signing
    # steps once the gate is flipped.
    secrets:
      SSLCOM_USERNAME:
        required: false
      SSLCOM_PASSWORD:
        required: false
      SSLCOM_CREDENTIAL_ID:
        required: false
      SSLCOM_TOTP_SECRET:
        required: false

# ──────────────────────────────────────────────────────────────────────────────
# Codesigning gate — SSL.com eSigner Cloud Signing (CodeSignTool CLI)
# ──────────────────────────────────────────────────────────────────────────────
# While SIGN_ARTIFACTS is 'false' the setup/sign/verify steps below all skip
# via their `if:` conditions, and the workflow ships unsigned artifacts —
# this is the safe default until the SSL.com OV cert is provisioned.
#
# To enable once the cert is in hand:
#   1. Add these four repository secrets (Settings → Secrets and variables →
#      Actions). They are forwarded into this reusable workflow via the
#      `secrets: inherit` line on the build-windows job in ci.yml.
#        SSLCOM_USERNAME       SSL.com account username
#        SSLCOM_PASSWORD       SSL.com account password
#        SSLCOM_CREDENTIAL_ID  Code-signing credential ID from the SSL.com
#                                dashboard (the value under "Credential ID"
#                                on the certificate's detail page).
#        SSLCOM_TOTP_SECRET    Base32 TOTP seed (NOT a rotating 6-digit code)
#                                generated when enabling OATH-based 2FA on
#                                the credential — see SSL.com's automation
#                                guide. Required because CodeSignTool's
#                                non-interactive flow re-derives a one-time
#                                code from this seed on every sign call.
#   2. Flip SIGN_ARTIFACTS to 'true' below.
#   3. (Optional) Bump CODESIGN_TOOL_VERSION when SSL.com publishes a new
#      CodeSignTool release at https://github.com/SSLcom/CodeSignTool/releases
#      — the Windows zip bundles its own JRE so no Java setup is needed.
#
# Reference: https://www.ssl.com/guide/esigner-codesigntool-command-guide/
# Product:   https://www.ssl.com/products/software-integrity/signing-service/
env:
  SIGN_ARTIFACTS: 'false'
  CODESIGN_TOOL_VERSION: '1.3.2'

jobs:
  build_windows:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: msys2 {0}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows-AMD64
            os: windows-2022
            arch: x86_64
            msystem: ucrt64
            toolchain: ucrt-x86_64
    steps:
      - name: Checkout
        # Main repo only. Submodule init is deferred to the next step so we
        # can wrap it in retry/backoff — see "Initialize submodules" below
        # for the rationale.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: false

      - name: Initialize submodules
        # Replaces actions/checkout's built-in `submodules: recursive`
        # mechanism with a retry loop, because git submodule clones over
        # https://github.com/ are sensitive to transient GHA-side
        # authentication flakes that the bundled checkout action has no
        # retry semantics for. A single 401 on any submodule's clone
        # exit-codes 128 and kills the whole checkout, even though other
        # submodules in the same call succeeded. We hit this twice in a
        # row on 2026-05-23 (run 26332388835) — once on the main-repo
        # fetch, once partway through submodule init where some public
        # repos cloned and others got "could not read Username".
        #
        # The actual `git submodule update --init --force --depth=1
        # --recursive` invocation is identical to what `actions/checkout
        # submodules: recursive` would run internally — including the
        # recursive descent that pulls in nested submodules (notably
        # `third-party/moonlight-common-c/enet`, which the Moonlight
        # protocol's networking depends on; without it CMake fails at
        # `add_subdirectory(.../moonlight-common-c/enet)` in
        # cmake/dependencies/common.cmake:10). The historically-broken
        # nested `doxyconfig/doxygen-awesome-css` is no longer walked
        # because the top-level `doxyconfig` entry is commented out in
        # .gitmodules.
        #
        # `actions/checkout` already wired up the AUTHORIZATION header
        # via `git config --global include.path …` in the previous
        # step, so this manual `git submodule update` inherits the same
        # token-backed credentials — no extra plumbing needed.
        #
        # `git submodule deinit --all --force` between attempts strips
        # any partial state from the failed clone so each retry starts
        # from a clean slate. Without it, a half-cloned submodule
        # directory can survive into the next attempt and trigger
        # "destination path already exists" failures that have nothing
        # to do with the original flake.
        shell: bash
        run: |
          set +e
          for attempt in 1 2 3 4 5; do
            git submodule update --init --force --depth=1 --recursive
            rc=$?
            if [ "${rc}" -eq 0 ]; then
              echo "Submodules initialised on attempt ${attempt}."
              exit 0
            fi
            echo "::warning::Submodule init failed on attempt ${attempt} (exit ${rc}); cleaning partial state and retrying."
            git submodule deinit --all --force >/dev/null 2>&1 || true
            sleep_secs=$((attempt * 10))
            echo "Sleeping ${sleep_secs}s before next attempt..."
            sleep "${sleep_secs}"
          done
          echo "::error::Submodule init failed after 5 attempts."
          exit 1

      - name: Setup Dependencies Windows
        # if a dependency needs to be pinned, see https://github.com/LizardByte/build-deps/pull/186
        uses: msys2/setup-msys2@e9898307ac31d1a803454791be09ab9973336e1c  # v2.31.1
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: >-
            wget
          # Inherit the Windows PATH (prepend MSYS2 bins to it instead of
          # replacing it) so subsequent `shell: msys2 {0}` steps can see
          # tools installed by other Actions — specifically the official
          # Node.js placed on PATH by actions/setup-node below. Without
          # this, CMake's find_program(NPM npm REQUIRED) fails because
          # MSYS2's default minimal PATH doesn't include the runner-side
          # tool directories.
          path-type: inherit

      - name: Setup Node.js
        # Use the official MSVC-built Node.js Windows binary instead of the
        # MSYS2 mingw-w64 build. The mingw-w64 nodejs package
        # (mingw-w64-ucrt-x86_64-nodejs) suffers from a std::bad_weak_ptr
        # race in libuv worker-thread teardown that crashes both `npm ci`
        # and `vite build` with STATUS_STACK_BUFFER_OVERRUN
        # (exit 0xC0000409). The bug is in how MSYS2 builds Node from
        # source with clang/mingw-w64 — the official MSVC-compiled Windows
        # binaries from nodejs.org don't have it. CMake's web-ui target
        # uses find_program(NPM npm REQUIRED) so it picks up whichever
        # `npm` is first on PATH; actions/setup-node prepends its install
        # so the official binary wins.
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238  # v6.2.0
        with:
          node-version: '22'

      - name: Update Windows dependencies
        env:
          # MSYSTEM is a built-in environment variable of MSYS2.
          # Do not use this environment variable name.
          MATRIX_MSYSTEM: ${{ matrix.msystem }}
          TOOLCHAIN: ${{ matrix.toolchain }}
        shell: msys2 {0}
        run: |
          # variables
          declare -A pinned_deps

          # dependencies
          # NOTE: We build with clang (not gcc) so __try/__except SEH compiles
          # natively under -fms-extensions. The toolchain meta-package stays to
          # provide binutils/headers/runtime libs that clang relies on; the
          # extra disk for gcc is acceptable and the two compilers coexist.
          dependencies=(
            "git"
            "mingw-w64-${TOOLCHAIN}-boost"
            "mingw-w64-${TOOLCHAIN}-clang"
            "mingw-w64-${TOOLCHAIN}-cmake"
            "mingw-w64-${TOOLCHAIN}-cppwinrt"
            "mingw-w64-${TOOLCHAIN}-curl-winssl"
            "mingw-w64-${TOOLCHAIN}-graphviz"
            "mingw-w64-${TOOLCHAIN}-lld"
            "mingw-w64-${TOOLCHAIN}-miniupnpc"
            "mingw-w64-${TOOLCHAIN}-nlohmann-json"
            "mingw-w64-${TOOLCHAIN}-ninja"
            "mingw-w64-${TOOLCHAIN}-onevpl"
            "mingw-w64-${TOOLCHAIN}-openssl"
            "mingw-w64-${TOOLCHAIN}-opus"
            "mingw-w64-${TOOLCHAIN}-toolchain"
          )

          if [[ "${MATRIX_MSYSTEM}" == "ucrt64" ]]; then
            dependencies+=(
              "mingw-w64-${TOOLCHAIN}-MinHook"
              "mingw-w64-${TOOLCHAIN}-nsis"
            )
          fi
          # NOTE: mingw-w64-${TOOLCHAIN}-nodejs is intentionally not in
          # this list. We use actions/setup-node to install the official
          # MSVC-built Node.js binary instead — see the "Setup Node.js"
          # step above for the rationale.

          # do not modify below this line

          ignore_packages=()
          tarballs=()
          for pkg in "${!pinned_deps[@]}"; do
            ignore_packages+=("${pkg}")
            version="${pinned_deps[$pkg]}"
            tarball="${pkg}-${version}-any.pkg.tar.zst"

            # download working version
            wget "https://repo.msys2.org/mingw/${MATRIX_MSYSTEM}/${tarball}"

            tarballs+=("${tarball}")
          done

          # Create the ignore string for pacman
          ignore_list=$(IFS=,; echo "${ignore_packages[*]}")

          # install pinned dependencies
          if [ ${#tarballs[@]} -gt 0 ]; then
            pacman -U --noconfirm "${tarballs[@]}"
          fi

          # Only add --ignore if we have packages to ignore
          if [ -n "${ignore_list}" ]; then
            pacman -Syu --noconfirm --ignore="${ignore_list}" "${dependencies[@]}"
          else
            pacman -Syu --noconfirm "${dependencies[@]}"
          fi

      - name: Install Doxygen
        # GCC compiled doxygen has issues when running graphviz
        env:
          DOXYGEN_VERSION: "1.11.0"
        shell: pwsh
        run: |
          # Set version variables
          $doxy_ver = $env:DOXYGEN_VERSION
          $_doxy_ver = $doxy_ver.Replace(".", "_")

          # Download the Doxygen installer
          Invoke-WebRequest -Uri `
            "https://github.com/doxygen/doxygen/releases/download/Release_${_doxy_ver}/doxygen-${doxy_ver}-setup.exe" `
            -OutFile "doxygen-setup.exe"

          # Run the installer
          Start-Process `
            -FilePath .\doxygen-setup.exe `
            -ArgumentList `
              '/VERYSILENT' `
          -Wait `
          -NoNewWindow

          # Clean up
          Remove-Item -Path doxygen-setup.exe

      - name: Setup dotnet  # needed for wix
        uses: actions/setup-dotnet@baa11fbfe1d6520db94683bd5c7a3818018e4309  # v5.1.0
        with:
          dotnet-version: '10.x'

      - name: Setup python
        id: setup-python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'

      - name: Python Path
        id: python-path
        shell: msys2 {0}
        run: |
          # replace backslashes with double backslashes
          python_path=$(echo "${{ steps.setup-python.outputs.python-path }}" | sed 's/\\/\\\\/g')

          # step output
          echo "python-path=${python_path}"
          echo "python-path=${python_path}" >> "${GITHUB_OUTPUT}"

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          choco install wixtoolset -y

      - name: Fetch SudoVDA driver bundle
        shell: pwsh
        env:
          # Apollo version that ships a working signed SudoVDA.dll bundle.
          # All four signed/source files (.inf, .cat, .cer, uninstall.bat) are
          # fetched from the SAME Apollo tag so the catalog matches the .dll.
          APOLLO_VERSION: '0.4.6'
          # Nefarius/nefcon release that provides nefconc.exe.
          NEFCON_VERSION: 'v1.17.40'
        run: |
          $ErrorActionPreference = 'Stop'
          $driversDir = Join-Path $PWD 'src_assets/windows/drivers/sudovda'
          if (-not (Test-Path $driversDir)) {
            throw "Drivers directory missing: $driversDir"
          }

          $apolloRaw = "https://raw.githubusercontent.com/ClassicOldSong/Apollo/v$($env:APOLLO_VERSION)/src_assets/windows/drivers/sudovda"
          foreach ($file in 'SudoVDA.inf', 'sudovda.cat', 'sudovda.cer', 'uninstall.bat') {
            $dest = Join-Path $driversDir $file
            Write-Host "Downloading $file from Apollo v$($env:APOLLO_VERSION)..."
            Invoke-WebRequest -Uri "$apolloRaw/$file" -OutFile $dest -UseBasicParsing
          }

          $nefconTmp = Join-Path $env:RUNNER_TEMP 'nefcon'
          New-Item -ItemType Directory -Path $nefconTmp -Force | Out-Null
          $nefconZip = Join-Path $nefconTmp 'nefcon.zip'
          $nefconUrl = "https://github.com/nefarius/nefcon/releases/download/$($env:NEFCON_VERSION)/nefcon_$($env:NEFCON_VERSION).zip"
          Write-Host "Downloading nefcon $($env:NEFCON_VERSION)..."
          Invoke-WebRequest -Uri $nefconUrl -OutFile $nefconZip -UseBasicParsing
          Expand-Archive -Path $nefconZip -DestinationPath $nefconTmp -Force
          $nefconc = Get-ChildItem -Path $nefconTmp -Recurse -Filter 'nefconc.exe' |
                       Where-Object { $_.FullName -match '(?i)x64|amd64' } |
                       Select-Object -First 1
          if (-not $nefconc) {
            throw "nefconc.exe (x64) not found in $nefconUrl"
          }
          Copy-Item $nefconc.FullName (Join-Path $driversDir 'nefconc.exe') -Force

          $apolloTmp = Join-Path $env:RUNNER_TEMP 'apollo'
          New-Item -ItemType Directory -Path $apolloTmp -Force | Out-Null
          $apolloExe = Join-Path $apolloTmp "Apollo-$($env:APOLLO_VERSION).exe"
          $apolloUrl = "https://github.com/ClassicOldSong/Apollo/releases/download/v$($env:APOLLO_VERSION)/Apollo-$($env:APOLLO_VERSION).exe"
          Write-Host "Downloading Apollo installer v$($env:APOLLO_VERSION) for SudoVDA.dll extraction..."
          Invoke-WebRequest -Uri $apolloUrl -OutFile $apolloExe -UseBasicParsing
          $apolloExtracted = Join-Path $apolloTmp 'extracted'
          $sevenZip = 'C:\Program Files\7-Zip\7z.exe'
          if (-not (Test-Path $sevenZip)) {
            throw "7-Zip not found at $sevenZip"
          }
          & $sevenZip x "-o$apolloExtracted" $apolloExe -y | Out-Null
          if ($LASTEXITCODE -ne 0) {
            throw "7-Zip failed to extract $apolloExe (exit $LASTEXITCODE)"
          }
          $sudoDll = Get-ChildItem -Path $apolloExtracted -Recurse -Filter 'SudoVDA.dll' |
                       Select-Object -First 1
          if (-not $sudoDll) {
            throw "SudoVDA.dll not found inside Apollo installer $apolloExe"
          }
          Copy-Item $sudoDll.FullName (Join-Path $driversDir 'SudoVDA.dll') -Force

          $required = @('install.ps1','uninstall.bat','SudoVDA.inf','SudoVDA.dll','sudovda.cat','sudovda.cer','nefconc.exe')
          foreach ($file in $required) {
            $p = Join-Path $driversDir $file
            if (-not (Test-Path $p)) { throw "Driver artifact missing after fetch: $p" }
            if ((Get-Item $p).Length -le 0) { throw "Driver artifact is empty: $p" }
          }
          Write-Host "SudoVDA driver bundle ready:"
          Get-ChildItem $driversDir | Select-Object Name, Length | Format-Table -AutoSize | Out-String | Write-Host

      - name: Build Windows
        shell: msys2 {0}
        env:
          # MSYSTEM is a built-in environment variable of MSYS2.
          # Do not use this environment variable name.
          MATRIX_MSYSTEM: ${{ matrix.msystem }}
          BRANCH: ${{ github.head_ref || github.ref_name }}
          BUILD_VERSION: ${{ inputs.release_version }}
          COMMIT: ${{ inputs.release_commit }}
          # Build with clang from msys2 ucrt64. -fms-extensions enables MSVC
          # SEH keywords (__try/__except/__finally) so the dxgi.dll AV
          # mitigation in src/platform/windows/display_base.cpp compiles
          # natively. lld is used as the linker for faster link times.
          CC: clang
          CXX: clang++
          CFLAGS: "-fms-extensions"
          CXXFLAGS: "-fms-extensions"
          LDFLAGS: "-fuse-ld=lld"
        run: |
          mkdir -p build
          cmake \
            -B build \
            -G Ninja \
            -S . \
            -DBUILD_WERROR=OFF \
            -DBUILD_DOCS=OFF \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DSUNSHINE_ASSETS_DIR=assets \
            -DSUNSHINE_PUBLISHER_NAME="NortheBridge Foundation" \
            -DSUNSHINE_PUBLISHER_WEBSITE="https://northebridge.com/" \
            -DSUNSHINE_PUBLISHER_ISSUE_URL="https://github.com/NortheBridge/luminalshine"
          ninja -C build

      # WiX already installed before configure so env:WIX is available

      # ── Codesigning (SSL.com eSigner) ─────────────────────────────────────
      # All four steps below are gated on `env.SIGN_ARTIFACTS == 'true'` and
      # skip entirely while the gate is off. Order matters: built EXEs are
      # signed first so their signatures are preserved when CPack stages
      # them into the MSI and the portable ZIP; the MSI is signed after
      # CPack emits it but before the bootstrapper embeds it as a payload
      # resource; the bootstrapper EXE is signed last so the outermost file
      # users execute carries a valid signature wrapping a signed payload.
      - name: Setup eSigner CodeSignTool
        if: env.SIGN_ARTIFACTS == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = $env:CODESIGN_TOOL_VERSION
          $stagingDir = Join-Path $env:RUNNER_TEMP 'codesigntool'
          $zipPath = Join-Path $env:RUNNER_TEMP "CodeSignTool-windows.zip"
          $url = "https://github.com/SSLcom/CodeSignTool/releases/download/v$version/CodeSignTool-v$version-windows.zip"
          Write-Host "Downloading CodeSignTool v$version from $url"
          Invoke-WebRequest -Uri $url -OutFile $zipPath -UseBasicParsing
          New-Item -ItemType Directory -Path $stagingDir -Force | Out-Null
          Expand-Archive -Path $zipPath -DestinationPath $stagingDir -Force
          $bat = Get-ChildItem -Path $stagingDir -Filter 'CodeSignTool.bat' -Recurse -File |
                   Select-Object -First 1
          if (-not $bat) { throw 'CodeSignTool.bat not found after extracting the eSigner archive.' }
          # Export the resolved path so subsequent sign steps can call it
          # without re-discovering the extracted layout.
          "CODESIGN_TOOL_BAT=$($bat.FullName)" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8
          Write-Host "CodeSignTool ready at $($bat.FullName)"

      - name: Sign built executables
        if: env.SIGN_ARTIFACTS == 'true'
        shell: pwsh
        env:
          SSLCOM_USERNAME: ${{ secrets.SSLCOM_USERNAME }}
          SSLCOM_PASSWORD: ${{ secrets.SSLCOM_PASSWORD }}
          SSLCOM_CREDENTIAL_ID: ${{ secrets.SSLCOM_CREDENTIAL_ID }}
          SSLCOM_TOTP_SECRET: ${{ secrets.SSLCOM_TOTP_SECRET }}
        run: |
          $ErrorActionPreference = 'Stop'
          $bat = $env:CODESIGN_TOOL_BAT
          if (-not $bat -or -not (Test-Path $bat)) {
            throw 'CodeSignTool not installed — Setup eSigner CodeSignTool step did not run.'
          }
          foreach ($name in 'SSLCOM_USERNAME','SSLCOM_PASSWORD','SSLCOM_CREDENTIAL_ID','SSLCOM_TOTP_SECRET') {
            if ([string]::IsNullOrWhiteSpace((Get-Item "env:$name").Value)) {
              throw "Required signing secret '$name' is empty. Add it under Settings → Secrets and variables → Actions, and confirm ci.yml's build-windows job carries 'secrets: inherit'."
            }
          }
          # Sign every native EXE produced by the build. Test binaries are
          # excluded because they are advisory-only and never shipped.
          # CPack's _CPack_Packages staging directory doesn't exist yet at
          # this point in the pipeline, so we don't need to filter for it.
          $targets = Get-ChildItem -Path 'build' -Filter '*.exe' -Recurse -File |
                       Where-Object { $_.FullName -notmatch '[\\/]tests[\\/]' -and $_.Name -notlike 'test_*' }
          if (-not $targets) { throw 'No executables found under build/ to sign.' }
          foreach ($t in $targets) {
            Write-Host "Signing $($t.FullName)"
            & $bat sign `
                -username="$env:SSLCOM_USERNAME" `
                -password="$env:SSLCOM_PASSWORD" `
                -credential_id="$env:SSLCOM_CREDENTIAL_ID" `
                -totp_secret="$env:SSLCOM_TOTP_SECRET" `
                -input_file_path="$($t.FullName)" `
                -override
            if ($LASTEXITCODE -ne 0) {
              throw "CodeSignTool failed for $($t.FullName) (exit $LASTEXITCODE)"
            }
          }

      - name: Package Windows (MSI and portable ZIP)
        shell: msys2 {0}
        # The MSI is now produced by the hand-authored luminalshine_msi
        # target (cmake/packaging/windows_wix.cmake) which drives
        # candle.exe + light.exe directly — CPack's WIX generator is
        # no longer invoked. The portable ZIP still goes through CPack
        # since cpack -G ZIP has no equivalent migration concern.
        # See packaging/windows/wix/luminalshine.wxs and
        # scripts/gen_wix_files.py for the source-of-truth authoring
        # and the CMake target chain (stage -> gen -> candle -> light).
        run: |
          mkdir -p artifacts
          ninja -C build luminalshine_msi
          cd build
          cpack -G ZIP

      - name: MSI upgrade-compatibility check
        # WiX 3 -> WiX 7 migration oracle. Dumps the freshly built MSI's
        # upgrade-critical tables and diffs them against the committed
        # golden baseline (tests/fixtures/msi_golden/wix3_baseline.txt).
        # While the baseline is absent (before it has been captured on a
        # Windows build and committed), this step CAPTURES the dump as an
        # artifact and warns instead of failing — so it never blocks a
        # build that predates baseline capture. PR5 promotes this to a hard
        # gate once the baseline is committed.
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $msi = Get-ChildItem -Path 'build/cpack_artifacts' -Filter '*.msi' -File |
                   Sort-Object LastWriteTime -Descending |
                   Select-Object -First 1
          if (-not $msi) { throw 'No MSI under build/cpack_artifacts/ to check.' }
          New-Item -ItemType Directory -Force -Path 'msi_compat' | Out-Null
          $candidate = 'msi_compat/candidate.txt'
          pwsh scripts/dump_msi_tables.ps1 -MsiPath $msi.FullName -OutFile $candidate
          $golden = 'tests/fixtures/msi_golden/wix3_baseline.txt'
          if (Test-Path $golden) {
            python scripts/diff_msi_tables.py $golden $candidate
            if ($LASTEXITCODE -ne 0) { throw "MSI upgrade-compatibility diff failed (see above)." }
          } else {
            Write-Warning "Golden baseline $golden not committed yet; captured candidate dump as artifact. See tests/fixtures/msi_golden/README.md to promote it."
            Copy-Item $candidate 'msi_compat/wix3_baseline.candidate.txt'
          }

      - name: Upload MSI compatibility dump
        uses: actions/upload-artifact@v4
        with:
          name: msi-compat-dump
          path: msi_compat/
          if-no-files-found: ignore

      - name: Sign MSI
        if: env.SIGN_ARTIFACTS == 'true'
        shell: pwsh
        env:
          SSLCOM_USERNAME: ${{ secrets.SSLCOM_USERNAME }}
          SSLCOM_PASSWORD: ${{ secrets.SSLCOM_PASSWORD }}
          SSLCOM_CREDENTIAL_ID: ${{ secrets.SSLCOM_CREDENTIAL_ID }}
          SSLCOM_TOTP_SECRET: ${{ secrets.SSLCOM_TOTP_SECRET }}
        run: |
          $ErrorActionPreference = 'Stop'
          $bat = $env:CODESIGN_TOOL_BAT
          $msi = Get-ChildItem -Path 'build/cpack_artifacts' -Filter '*.msi' -File |
                   Sort-Object LastWriteTime -Descending |
                   Select-Object -First 1
          if (-not $msi) { throw 'No MSI to sign under build/cpack_artifacts/.' }
          Write-Host "Signing $($msi.FullName)"
          & $bat sign `
              -username="$env:SSLCOM_USERNAME" `
              -password="$env:SSLCOM_PASSWORD" `
              -credential_id="$env:SSLCOM_CREDENTIAL_ID" `
              -totp_secret="$env:SSLCOM_TOTP_SECRET" `
              -input_file_path="$($msi.FullName)" `
              -override
          if ($LASTEXITCODE -ne 0) { throw "CodeSignTool failed for MSI (exit $LASTEXITCODE)" }

      - name: Build bootstrapper EXE
        shell: msys2 {0}
        run: |
          cd build
          # build custom installer executable that wraps the (now signed) MSI payload
          powershell -NoProfile -ExecutionPolicy Bypass -File ../packaging/windows/bootstrapper/build_bootstrapper.ps1 -BuildDir "$(cygpath -w "$(pwd)")"

      - name: Sign bootstrapper EXE
        if: env.SIGN_ARTIFACTS == 'true'
        shell: pwsh
        env:
          SSLCOM_USERNAME: ${{ secrets.SSLCOM_USERNAME }}
          SSLCOM_PASSWORD: ${{ secrets.SSLCOM_PASSWORD }}
          SSLCOM_CREDENTIAL_ID: ${{ secrets.SSLCOM_CREDENTIAL_ID }}
          SSLCOM_TOTP_SECRET: ${{ secrets.SSLCOM_TOTP_SECRET }}
        run: |
          $ErrorActionPreference = 'Stop'
          $bat = $env:CODESIGN_TOOL_BAT
          $exe = Join-Path $PWD 'build/cpack_artifacts/LuminalShineSetup.exe'
          if (-not (Test-Path $exe)) { throw "Bootstrapper EXE not found at $exe" }
          Write-Host "Signing $exe"
          & $bat sign `
              -username="$env:SSLCOM_USERNAME" `
              -password="$env:SSLCOM_PASSWORD" `
              -credential_id="$env:SSLCOM_CREDENTIAL_ID" `
              -totp_secret="$env:SSLCOM_TOTP_SECRET" `
              -input_file_path="$exe" `
              -override
          if ($LASTEXITCODE -ne 0) { throw "CodeSignTool failed for bootstrapper (exit $LASTEXITCODE)" }

      - name: Stage Windows artifacts
        shell: msys2 {0}
        run: |
          cd build

          # Locate emitted artifacts. nullglob makes unmatched globs expand to
          # nothing instead of the literal pattern, so `ls` doesn't error out
          # under `bash -eo pipefail` when a fallback name doesn't exist.
          shopt -s nullglob
          msi_files=(./cpack_artifacts/*.msi)
          installer_files=(./cpack_artifacts/LuminalShineSetup.exe ./cpack_artifacts/*-installer.exe)
          zip_files=(./cpack_artifacts/*.zip)
          shopt -u nullglob

          if (( ${#msi_files[@]} == 0 )); then
            echo "::error::No MSI produced in ./cpack_artifacts/"; exit 1
          fi
          if (( ${#installer_files[@]} == 0 )); then
            echo "::error::No installer EXE produced in ./cpack_artifacts/"; exit 1
          fi
          if (( ${#zip_files[@]} == 0 )); then
            echo "::error::No portable ZIP produced in ./cpack_artifacts/"; exit 1
          fi

          # All three of MSI, bootstrapper EXE and portable ZIP are
          # promoted to the artifacts directory. The release job in
          # ci.yml (softprops/action-gh-release) attaches the EXE and
          # ZIP but explicitly NOT the .msi — the raw MSI still builds
          # and is preserved in the build-Windows-AMD64 Actions
          # artifact for internal access, but published downloads on
          # the GitHub release page are the bootstrapper .exe plus the
          # portable ZIP. build_bootstrapper.ps1 embeds the MSI inside
          # the .exe via `/resource:...,Payload.msi`; the .exe is what
          # users run, and the standalone MSI is the same payload
          # exposed for advanced operators who want to drive msiexec
          # directly via the CI artifact.
          #
          # File naming is fixed-string `LuminalShine_x64-...` rather
          # than the per-matrix shape because the matrix has exactly
          # one entry (Windows-AMD64) and the customer-facing release
          # assets shouldn't carry the CI's internal job-name shape.
          # If a 32-bit or ARM64 matrix entry is added later, add a
          # per-entry arch_label input to the matrix and substitute
          # it into the prefix below.
          msi_file="${msi_files[0]}"
          installer_exe="${installer_files[0]}"
          portable_zip="${zip_files[0]}"

          # move
          mv "${msi_file}" ../artifacts/LuminalShine_x64-installer.msi
          mv "${installer_exe}" ../artifacts/LuminalShine_x64-installer.exe
          mv "${portable_zip}" ../artifacts/LuminalShine_x64-portable.zip

      - name: Verify signatures
        if: env.SIGN_ARTIFACTS == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $files = @(
            'artifacts/LuminalShine_x64-installer.exe',
            'artifacts/LuminalShine_x64-installer.msi'
          )
          foreach ($f in $files) {
            $sig = Get-AuthenticodeSignature -FilePath $f
            Write-Host "$($f): $($sig.Status) — $($sig.SignerCertificate.Subject)"
            if ($sig.Status -ne 'Valid') {
              throw "Signature invalid on ${f}: $($sig.Status) — $($sig.StatusMessage)"
            }
          }

      # Diagnostic dumps for packaging failures. CPack's "Fatal WiX
      # Generator Error" / "Problem running WiX" messages by themselves
      # are useless — the actionable error lives in wix.log (or, for the
      # NSIS path, NSISOutput.log). Hosted runners are torn down minutes
      # after the job ends, so neither file survives the run unless we
      # cat it into the step log. These steps fire only on failure (green
      # builds don't need the noise) and use clearly-marked delimiters so
      # the relevant block is easy to find in a long action log.
      #
      # Each step is independently `|| true` because either log can be
      # absent: NSISOutput.log only exists when the NSIS generator was
      # invoked, and wix.log is only written after candle.exe starts —
      # an earlier CPack failure (template-rendering, file-staging) skips
      # straight to "Fatal Generator Error" without writing it.
      - name: Dump packaging logs on failure
        if: failure()
        shell: msys2 {0}
        run: |
          set +e
          for log_path in \
            ./build/cpack_artifacts/_CPack_Packages/win64/NSIS/NSISOutput.log \
            ./build/cpack_artifacts/_CPack_Packages/win64/WIX/wix.log
          do
            log_name=$(basename "$log_path")
            echo "::group::${log_name}"
            echo "===== begin ${log_path} ====="
            if [ -f "$log_path" ]; then
              cat "$log_path"
            else
              echo "(file not present — generator failed before writing it)"
            fi
            echo "===== end ${log_path} ====="
            echo "::endgroup::"
          done

          # When wix.log is missing, the .wixobj/.wxs siblings in the same
          # directory still tell us how far candle.exe got. List them so a
          # future maintainer can correlate the WiX phase with the failure.
          wix_dir=./build/cpack_artifacts/_CPack_Packages/win64/WIX
          if [ -d "$wix_dir" ]; then
            echo "::group::WIX directory listing"
            ls -la "$wix_dir" 2>&1 || true
            echo "::endgroup::"
          fi

      - name: Run tests
        id: test
        # Tests run inside a GitHub Actions runner that has no real display
        # adapter, no Playnite install, no httpbin.org reachability guarantee,
        # and a stripped-down locale set. A subset of the test suite is
        # environment-sensitive and fails on the runner even when the binaries
        # themselves are healthy. Treat the run as advisory: surface failures
        # in the test_results.xml artifact but don't gate the release on them.
        # When `BUILD_TESTS_WITH_COVERAGE=OFF` (the CI default), no .gcda
        # files are produced and the legacy gcov/coverage upload steps were
        # removed since they had nothing to report.
        continue-on-error: true
        shell: msys2 {0}
        working-directory: build/tests
        run: ./test_sunshine.exe --gtest_color=yes --gtest_output=xml:test_results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
        with:
          name: test-results-${{ matrix.name }}
          path: build/tests/test_results.xml
          if-no-files-found: warn

      - name: Package Windows Debug Info
        shell: pwsh
        working-directory: build
        run: |
          # use .dbg file extension for binaries to avoid confusion with real packages
          Get-ChildItem -File -Recurse | `
            % { Rename-Item -Path $_.PSPath -NewName $_.Name.Replace(".exe",".dbg") }

          # save the binaries with debug info
          7z -r `
            "-xr!CMakeFiles" `
            "-xr!cpack_artifacts" `
            a "../artifacts/LuminalShine_x64-debuginfo.7z" "*.dbg"

      - name: Upload Artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
        with:
          name: build-${{ matrix.name }}
          path: artifacts/
          if-no-files-found: error
