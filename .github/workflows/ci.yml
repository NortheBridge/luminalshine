---
name: CI
permissions: {}

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (e.g., 26.04.0-alpha.1, no leading v)'
        required: true
        type: string
      publish_release:
        description: 'Create a GitHub Release with the built artifacts'
        required: false
        type: boolean
        default: true

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  release-setup:
    name: Release Setup
    outputs:
      publish_release: ${{ steps.release-setup.outputs.publish_release }}
      release_body: ${{ steps.release-setup.outputs.release_body }}
      release_commit: ${{ steps.release-setup.outputs.release_commit }}
      release_generate_release_notes: ${{ steps.release-setup.outputs.release_generate_release_notes }}
      release_tag: ${{ steps.release-setup.outputs.release_tag }}
      release_version: ${{ steps.release-setup.outputs.release_version }}
      prerelease: ${{ steps.release-setup.outputs.prerelease }}
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Release Setup
        id: release-setup
        env:
          REL_VERSION: ${{ inputs.release_version }}
          REL_PUBLISH: ${{ inputs.publish_release }}
        run: |
          set -euo pipefail
          version="${REL_VERSION}"
          tag="${version}"
          commit="$(git rev-parse HEAD)"

          # Treat any version with a hyphenated suffix (-alpha, -beta, -rc, etc.) as a prerelease.
          if [[ "${version}" == *-* ]]; then
            prerelease="true"
          else
            prerelease="false"
          fi

          {
            echo "release_version=${version}"
            echo "release_tag=${tag}"
            echo "release_commit=${commit}"
            echo "publish_release=${REL_PUBLISH}"
            echo "release_generate_release_notes=true"
            echo "prerelease=${prerelease}"
          } >> "${GITHUB_OUTPUT}"

          {
            echo "release_body<<__BODY_EOF__"
            echo "Automated release for ${tag}."
            echo "__BODY_EOF__"
          } >> "${GITHUB_OUTPUT}"

  build-windows:
    name: Windows
    needs: release-setup
    permissions:
      contents: read
    uses: ./.github/workflows/ci-windows.yml
    with:
      release_commit: ${{ needs.release-setup.outputs.release_commit }}
      release_version: ${{ needs.release-setup.outputs.release_version }}

  release:
    name: Release
    if: needs.release-setup.outputs.publish_release == 'true'
    needs:
      - release-setup
      - build-windows
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
        with:
          path: artifacts
          pattern: build-*
          merge-multiple: true

      - name: Debug artifacts
        run: ls -l artifacts

      - name: Create GitHub Release (draft)
        # `draft: true` so the release is created in the unpublished
        # "Draft" state. Maintainer edits release notes via the GitHub
        # UI, then clicks "Publish release" when ready. The Publish
        # action is what flips draft → published, which fires the
        # downstream `released` notifiers (_release-notifier.yml,
        # release-notifier-moonlight.yml) and the fixed-issue follow-up
        # (fixed-issue-follow-up.yml — already filtered on
        # `!github.event.release.draft`). All three of those workflows
        # are safe with drafts in flight; they simply don't fire until
        # the maintainer publishes.
        #
        # `prerelease` is independent of `draft` and is preserved: an
        # rc tag still gets the prerelease badge when published.
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          body: ${{ needs.release-setup.outputs.release_body }}
          generate_release_notes: ${{ needs.release-setup.outputs.release_generate_release_notes }}
          name: ${{ needs.release-setup.outputs.release_tag }}
          draft: true
          prerelease: ${{ needs.release-setup.outputs.prerelease }}
          tag_name: ${{ needs.release-setup.outputs.release_tag }}
          # Explicit file list — the raw MSI is intentionally excluded
          # from the published release. The MSI still ships inside the
          # build-Windows-AMD64 Actions artifact for internal /
          # debugging access (and as build_bootstrapper.ps1's embedded
          # payload), but customer-facing downloads on the GitHub
          # release page are: the bootstrapper .exe (the user-facing
          # installer), the portable ZIP, and the debuginfo 7z. Switch
          # to `artifacts/*` to publish the MSI again.
          files: |
            artifacts/LuminalShine_x64-installer.exe
            artifacts/LuminalShine_x64-portable.zip
            artifacts/LuminalShine_x64-debuginfo.7z
          fail_on_unmatched_files: true
          token: ${{ secrets.GITHUB_TOKEN }}
