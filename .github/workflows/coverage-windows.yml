---
# Windows C++ coverage workflow. Builds a coverage-instrumented test binary on
# MSYS2/clang, runs it, processes .gcda files with llvm-cov via gcovr, and
# uploads the resulting Cobertura XML to Codecov under the `windows` flag.
#
# Runs on every PR targeting main and on push to main. This is separate from
# ci-windows.yml (which builds packaging artifacts) so the coverage build can
# stay focused — Debug build type, no WiX/NSIS/bootstrapper, no MSI/exe/ZIP
# packaging.

name: Coverage (Windows)
permissions: {}

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: coverage-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage_windows:
    name: Windows-AMD64 Coverage
    runs-on: windows-2022
    defaults:
      run:
        shell: msys2 {0}
    permissions:
      contents: read
    env:
      MATRIX_MSYSTEM: ucrt64
      TOOLCHAIN: ucrt-x86_64
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: recursive
          # Codecov resolves PR context from commit history; depth 0 keeps it
          # reliable for PRs from forks and re-runs.
          fetch-depth: 0

      - name: Setup MSYS2
        uses: msys2/setup-msys2@e9898307ac31d1a803454791be09ab9973336e1c  # v2.31.1
        with:
          msystem: ucrt64
          update: true
          install: >-
            wget
          path-type: inherit

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238  # v6.2.0
        with:
          node-version: '22'

      - name: Install MSYS2 packages
        run: |
          dependencies=(
            "git"
            "mingw-w64-${TOOLCHAIN}-boost"
            "mingw-w64-${TOOLCHAIN}-clang"
            "mingw-w64-${TOOLCHAIN}-cmake"
            "mingw-w64-${TOOLCHAIN}-cppwinrt"
            "mingw-w64-${TOOLCHAIN}-curl-winssl"
            "mingw-w64-${TOOLCHAIN}-lld"
            "mingw-w64-${TOOLCHAIN}-miniupnpc"
            "mingw-w64-${TOOLCHAIN}-nlohmann-json"
            "mingw-w64-${TOOLCHAIN}-ninja"
            "mingw-w64-${TOOLCHAIN}-onevpl"
            "mingw-w64-${TOOLCHAIN}-openssl"
            "mingw-w64-${TOOLCHAIN}-opus"
            "mingw-w64-${TOOLCHAIN}-toolchain"
            "mingw-w64-${TOOLCHAIN}-MinHook"
            "mingw-w64-${TOOLCHAIN}-python-gcovr"
            "mingw-w64-${TOOLCHAIN}-compiler-rt"
          )
          # python-gcovr pulls in python, python-lxml, and the rest of gcovr's
          # runtime as MSYS2-prebuilt packages — sidesteps the pip-install
          # lxml-source-compile failure on MSYS2's PEP 668 externally-managed
          # environment (lxml has no pre-built wheel for Python 3.14 on
          # mingw_x86_64_ucrt_gnu so pip would fall back to source build,
          # which then errors out on missing libxml2 headers).
          pacman -Syu --noconfirm "${dependencies[@]}"

      - name: Fetch SudoVDA driver bundle
        # Same fetch as ci-windows.yml so the CMake configure step doesn't fail
        # on missing driver assets. We only need the files staged; we don't
        # sign/install them in the coverage workflow.
        shell: pwsh
        env:
          APOLLO_VERSION: '0.4.6'
          NEFCON_VERSION: 'v1.17.40'
        run: |
          $ErrorActionPreference = 'Stop'
          $driversDir = Join-Path $PWD 'src_assets/windows/drivers/sudovda'
          if (-not (Test-Path $driversDir)) {
            throw "Drivers directory missing: $driversDir"
          }

          $apolloRaw = "https://raw.githubusercontent.com/ClassicOldSong/Apollo/v$($env:APOLLO_VERSION)/src_assets/windows/drivers/sudovda"
          foreach ($file in 'SudoVDA.inf', 'sudovda.cat', 'sudovda.cer', 'uninstall.bat') {
            $dest = Join-Path $driversDir $file
            Invoke-WebRequest -Uri "$apolloRaw/$file" -OutFile $dest -UseBasicParsing
          }

          $nefconTmp = Join-Path $env:RUNNER_TEMP 'nefcon'
          New-Item -ItemType Directory -Path $nefconTmp -Force | Out-Null
          $nefconZip = Join-Path $nefconTmp 'nefcon.zip'
          $nefconUrl = "https://github.com/nefarius/nefcon/releases/download/$($env:NEFCON_VERSION)/nefcon_$($env:NEFCON_VERSION).zip"
          Invoke-WebRequest -Uri $nefconUrl -OutFile $nefconZip -UseBasicParsing
          Expand-Archive -Path $nefconZip -DestinationPath $nefconTmp -Force
          $nefconc = Get-ChildItem -Path $nefconTmp -Recurse -Filter 'nefconc.exe' |
                       Where-Object { $_.FullName -match '(?i)x64|amd64' } |
                       Select-Object -First 1
          if (-not $nefconc) { throw "nefconc.exe (x64) not found" }
          Copy-Item $nefconc.FullName (Join-Path $driversDir 'nefconc.exe') -Force

          $apolloTmp = Join-Path $env:RUNNER_TEMP 'apollo'
          New-Item -ItemType Directory -Path $apolloTmp -Force | Out-Null
          $apolloExe = Join-Path $apolloTmp "Apollo-$($env:APOLLO_VERSION).exe"
          $apolloUrl = "https://github.com/ClassicOldSong/Apollo/releases/download/v$($env:APOLLO_VERSION)/Apollo-$($env:APOLLO_VERSION).exe"
          Invoke-WebRequest -Uri $apolloUrl -OutFile $apolloExe -UseBasicParsing
          $apolloExtracted = Join-Path $apolloTmp 'extracted'
          $sevenZip = 'C:\Program Files\7-Zip\7z.exe'
          & $sevenZip x "-o$apolloExtracted" $apolloExe -y | Out-Null
          $sudoDll = Get-ChildItem -Path $apolloExtracted -Recurse -Filter 'SudoVDA.dll' | Select-Object -First 1
          if (-not $sudoDll) { throw "SudoVDA.dll not found inside Apollo installer" }
          Copy-Item $sudoDll.FullName (Join-Path $driversDir 'SudoVDA.dll') -Force

      - name: Configure CMake (coverage)
        env:
          CC: clang
          CXX: clang++
          CFLAGS: "-fms-extensions"
          CXXFLAGS: "-fms-extensions"
          LDFLAGS: "-fuse-ld=lld"
        run: |
          mkdir -p build
          cmake \
            -B build \
            -G Ninja \
            -S . \
            -DBUILD_WERROR=OFF \
            -DBUILD_DOCS=OFF \
            -DBUILD_TESTS=ON \
            -DBUILD_TESTS_WITH_COVERAGE=ON \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DSUNSHINE_ASSETS_DIR=assets \
            -DSUNSHINE_PUBLISHER_NAME="NortheBridge Foundation" \
            -DSUNSHINE_PUBLISHER_WEBSITE="https://northebridge.com/" \
            -DSUNSHINE_PUBLISHER_ISSUE_URL="https://github.com/NortheBridge/luminalshine"

      - name: Build tests
        run: ninja -C build test_sunshine

      - name: Run tests
        id: test
        # Mirrors the ci-windows.yml policy: hosted runner is environment-
        # sensitive (no display adapter, no Playnite, locale gaps) so some test
        # cases reliably fail even when the binaries are healthy. Don't gate the
        # workflow on test failures — coverage upload should still run so PRs
        # see the data either way.
        continue-on-error: true
        working-directory: build/tests
        run: ./test_sunshine.exe --gtest_color=yes --gtest_output=xml:test_results.xml

      - name: Generate coverage XML
        if: always() && steps.test.outcome != 'cancelled'
        working-directory: build
        run: |
          python -m gcovr \
            --gcov-executable "llvm-cov gcov" \
            . \
            -r ../src \
            --exclude-noncode-lines \
            --exclude-throw-branches \
            --exclude-unreachable-branches \
            --exclude '.*/third-party/.*' \
            --exclude '.*/tests/.*' \
            --verbose \
            --xml-pretty \
            -o coverage.xml

      - name: Upload coverage artifact
        if: always() && steps.test.outcome != 'cancelled'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
        with:
          name: coverage-windows
          path: |
            build/coverage.xml
            build/tests/test_results.xml
          if-no-files-found: warn

      - name: Upload to Codecov
        if: always() && steps.test.outcome != 'cancelled'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: build/coverage.xml
          flags: windows
          name: windows-amd64
          fail_ci_if_error: false
          verbose: true

      - name: Upload test results to Codecov Test Analytics
        # `--gtest_output=xml:test_results.xml` above already emits the
        # JUnit-compatible XML; this step just ships it. Run even when
        # the test step exited non-zero (continue-on-error keeps the
        # workflow alive) so the Test Analytics dashboard records
        # failing / flaky tests — those are the ones worth tracking,
        # and suppressing the upload on red runs would lose the signal.
        #
        # codecov-action@v5+ subsumed the standalone test-results-action
        # via `report_type: test_results` — codecov/test-results-action
        # is being deprecated, and the v1 release also ships on
        # Node.js 20 which the GitHub Actions runner is sunsetting on
        # 2026-09-16. Reusing the v6.0.0 SHA already pinned for the
        # coverage upload above keeps both uploads on the same action
        # version with no second SHA to keep in sync.
        if: always() && steps.test.outcome != 'cancelled'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
          files: build/tests/test_results.xml
          flags: windows
          name: windows-amd64-results
          # Non-blocking: a test-results upload failure is observability
          # noise, not a correctness signal — the coverage upload above
          # is what carries the gating data.
          fail_ci_if_error: false
          verbose: true
