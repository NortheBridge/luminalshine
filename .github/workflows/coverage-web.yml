---
# Vue/TypeScript web UI coverage. Runs Vitest with the v8 coverage provider
# against tests/frontend/, emits lcov.info, and uploads to Codecov under the
# `web` flag. Designed as a BLOCKING PR check: any test failure (or the upload
# itself failing) red-X's the PR.

name: Coverage (Web)
permissions: {}

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: coverage-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage_web:
    name: Vitest Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        # All npm scripts and vitest invocations live in the web package dir.
        working-directory: src_assets/common/assets/web
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # Codecov PR-context detection benefits from full history.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238  # v6.2.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src_assets/common/assets/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        # No continue-on-error: a Vitest failure or coverage emit failure must
        # fail the job and block the PR. This is the user-requested behavior
        # for Option D.
        run: npm run test:coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-web
          # vitest.config.ts writes lcov.info into <repoRoot>/coverage/web/.
          # working-directory above scopes shell steps, but actions/upload-
          # artifact's `path` is resolved from the workspace root regardless,
          # so this is the correct path.
          path: coverage/web/
          if-no-files-found: error

      - name: Upload to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          # Repo-root-relative path. Vitest emits lcov.info into coverage/web/.
          files: ../../../../coverage/web/lcov.info
          flags: web
          name: web-vitest
          # Non-blocking: a Codecov upload failure must not gate the PR.
          # The codecov CLI self-verifies its downloaded binary via GPG, and
          # Codecov's keyserver intermittently fails to serve the public key
          # ("gpg: Can't check signature: No public key" -> the wrapper exits
          # 1), which would otherwise block every merge on a Codecov-side
          # outage rather than any real coverage problem. This matches the
          # already-non-blocking Codecov upload in coverage-windows.yml.
          fail_ci_if_error: false
          verbose: true

      - name: Upload test results to Codecov Test Analytics
        # Run even when the test step above failed so the dashboard
        # records the failing test (Test Analytics keys flake tracking
        # off pass/fail history; suppressing the upload on red runs
        # would lose that signal). `!cancelled()` skips only manual
        # workflow cancellation.
        #
        # codecov-action@v5+ subsumed the standalone test-results-action
        # via `report_type: test_results` — codecov/test-results-action
        # is being deprecated, and the v1 release also ships on
        # Node.js 20 which the GitHub Actions runner is sunsetting on
        # 2026-09-16. Reusing the v6.0.0 SHA already pinned for the
        # coverage upload above keeps both uploads on the same action
        # version with no second SHA to keep in sync.
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
          # JUnit XML emitted by Vitest via the reporter wired in
          # src_assets/common/assets/web/vitest.config.ts.
          files: ../../../../coverage/web/junit.xml
          flags: web
          name: web-vitest-results
          # Non-blocking: a test-results upload failure is observability
          # noise, not a correctness signal — the test-coverage upload
          # above is what gates the PR.
          fail_ci_if_error: false
          verbose: true
