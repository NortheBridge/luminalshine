---
name: Build GH-Pages
permissions: {}

on:
  workflow_dispatch:

# Pages-recommended single-flight concurrency. Allow the in-flight deploy to
# complete so we don't interrupt a published deployment mid-rollout.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  prep:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: prep
          path: gh-pages-template/
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 1

  call-jekyll-build:
    needs: prep
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/_jekyll-build.yml
    with:
      site_artifact: 'prep'
      base_url: '_auto'
