---
# .readthedocs.yaml
# Read the Docs configuration file
# https://docs.readthedocs.io/en/stable/config-file/v2.html
#
# Builds the LuminalShine Sphinx documentation with the Furo theme,
# tuned to the NortheBridge "aurora" palette — a near-black background
# (#04060f / #070b1f) with cyan + royal-blue accents (#1ec8ff, #4a7dff)
# matching https://gitdocs.northebridge.com/luminalshine.
#
# Backwards-compat with the previous Doxygen-only build is preserved by
# running Doxygen in pre_build (producing the standalone HTML API
# browser) and then copying that browser into the Sphinx output at the
# /api/ subpath via post_build. The Sphinx side links to it from
# docs/api/cpp.md. We do not use breathe — it asserts on this
# project's namespace shapes under Sphinx's parallel build (-j auto).
#
# Theme colors and fonts are configured in docs/conf.py and
# docs/_static/luminalshine.css; this file only wires up the build.

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  apt_packages:
    - doxygen
    - graphviz
  jobs:
    pre_build:
      # Generate the standalone Doxygen HTML site. Output lands in
      # docs/html/ (Doxyfile defaults). Soft-fail so a doxygen hiccup
      # doesn't kill the whole HTML build — the Sphinx prose docs
      # will still ship.
      - cd docs && doxygen Doxyfile || echo "doxygen HTML build failed; /api/ will be missing"
    post_build:
      # Mount the Doxygen browser under /api/ in the published site.
      # Runs after sphinx-build, so it doesn't get clobbered.
      - if [ -d docs/html ]; then mkdir -p "${READTHEDOCS_OUTPUT}/html/api" && cp -R docs/html/. "${READTHEDOCS_OUTPUT}/html/api/"; fi

sphinx:
  configuration: docs/conf.py
  fail_on_warning: false

formats:
  - htmlzip
  - pdf
  - epub

python:
  install:
    - requirements: docs/requirements.txt

submodules:
  include: all
  recursive: true
